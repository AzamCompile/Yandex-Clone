<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#0f172a;
        }

        .login-box{
            width:380px;
            background:#1e293b;
            padding:40px;
            border-radius:20px;
            box-shadow:0 0 25px rgba(0,0,0,0.4);
        }

        .login-box h1{
            color:white;
            text-align:center;
            margin-bottom:30px;
            font-size:32px;
        }

        .input-box{
            margin-bottom:20px;
        }

        .input-box input{
            width:100%;
            padding:14px;
            border:none;
            outline:none;
            border-radius:12px;
            background:#334155;
            color:white;
            font-size:16px;
        }

        .input-box input::placeholder{
            color:#cbd5e1;
        }

        .login-btn{
            width:100%;
            padding:14px;
            border:none;
            border-radius:12px;
            background:#3b82f6;
            color:white;
            font-size:17px;
            cursor:pointer;
            transition:0.3s;
        }

        .login-btn:hover{
            background:#2563eb;
        }

        .error{
            color:#ef4444;
            text-align:center;
            margin-top:15px;
        }

        .register-link{
            text-align:center;
            margin-top:20px;
            color:#cbd5e1;
        }

        .register-link a{
            color:#3b82f6;
            text-decoration:none;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h1>Login</h1>

    <form method="POST">
        {% csrf_token %}

        <div class="input-box">
            <input type="text" name="username" placeholder="username">
        </div>

        <div class="input-box">
            <input type="password" name="password" placeholder="Password">
        </div>

        <button type="submit" class="login-btn">
            Login
        </button>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <div class="register-link">
            Don't have an account?
            <a href="{% url 'register' %}">Register</a>
        </div>
    </form>
</div>

</body>
</html>
